<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydration Heroes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="game-wrapper">
        <!-- Game title and mission-inspired subtitle -->
        <header class="game-header">
            <h1>Hydration Heroes</h1>
            <p class="subtitle">Help bring clean water to all</p>
            <p class="controls-hint">Move with arrow keys, mouse, or touch.</p>
        </header>

        <!-- Live game information (updated with JavaScript) -->
        <section class="game-stats" aria-label="Game stats">
            <p id="scoreDisplay" class="stat-card stat-score">Score <span id="score">0</span></p>
            <p id="timerDisplay" class="stat-card stat-timer">Time <span><span id="timeLeft">60</span>s</span></p>
            <p id="livesDisplay" class="stat-card stat-lives">Lives <span id="lives">3</span></p>
            <p id="goalDisplay" class="stat-card stat-goal">Goal <span id="targetScore">100</span></p>
        </section>

        <!-- Progress bar for reaching the target score -->
        <section class="score-progress" aria-label="Score progress to goal">
            <div class="progress-track">
                <div id="scoreProgressFill" class="progress-fill"></div>
            </div>
            <p id="scoreProgressText">0% to goal</p>
        </section>

        <!-- Feedback message shown during gameplay -->
        <p id="feedbackMessage" class="feedback-message" aria-live="polite">
            Press Start to play!
        </p>

        <!-- Main play area where water and pollutant drops will fall -->
        <section id="gameArea" class="game-area" aria-label="Hydration Heroes game area">
            <!-- Player catcher near the bottom of the game area -->
            <div id="playerCatcher" class="player-catcher" aria-label="Yellow jerry can catcher"></div>
        </section>

        <!-- Difficulty mode selector -->
        <section class="difficulty-selector" aria-label="Game difficulty selection">
            <label for="difficultySelect">Difficulty Level:</label>
            <select id="difficultySelect" aria-label="Choose game difficulty">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
            </select>
            <p id="difficultyInfo" class="difficulty-info">Currently playing: <strong>Normal</strong></p>
        </section>

        <!-- Game control buttons -->
        <section class="game-controls" aria-label="Game controls">
            <button id="startButton" type="button">Start</button>
            <button id="resetButton" type="button">Reset</button>
        </section>
    </main>

    <!-- Footer with mission and links -->
    <footer class="game-footer" aria-label="Learn more about charity: water">
        <div class="footer-content">
            <img src="img/cw_logo_horizontal.png" alt="charity: water logo" class="footer-logo">
            <p class="footer-mission">Learn how small actions can support access to clean water.</p>
            <nav class="footer-links" aria-label="charity: water resources">
                <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">Learn More</a>
                <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate</a>
            </nav>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
